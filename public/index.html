<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NoxVoice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="sidebar">

        <div class="title">🎧 NoxVoice</div>

        <p id="accountName">Loading...</p>

        <input id="username" placeholder="Username" readonly>
        <input id="roomCode" placeholder="Room Code">

        <button id="voiceBtn">🎤 Enable Mic</button>
        <button id="joinBtn">Join Room</button>
        <button id="muteBtn">🔇 Mute</button>

        <!-- KEEP ONLY THIS ONE STREAM BUTTON -->
        <button id="streamBtn">🖥️ Start Stream</button>

        <button id="logoutBtn">Logout</button>

        <p id="status">Offline</p>

        <div class="divider"></div>

        <h3>Connected Users</h3>
        <ul id="userList"></ul>

    </div>

    <div class="main">

        <div class="header">
            Live Voice Room
        </div>

        <div class="content">

            <p>Enable mic first, join a room, then start streaming if needed.</p>

            <h3>Room Streams</h3>

            <!-- STREAM OUTPUT WILL APPEAR HERE -->
            <div id="streamsGrid"></div>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
